// ── Extract text from PDF ──
async function extractPDF(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(s => s.str).join(" ") + "\n";
  }
  return text.trim();
}

// ── Extract text from DOCX ──
async function extractDOCX(file) {
  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: buf });
  return result.value.trim();
}

// ── Extract text from TXT ──
async function extractTXT(file) {
  return await file.text();
}

// ── CV Upload Zone Component ──
function CVUploadZone({ cvText, setCvText, cvFileName, setCvFileName }) {
  const [dragging, setDragging] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [error, setError] = useState("");
  const fileRef = useRef();

  const processFile = async (file) => {
    setError(""); setExtracting(true);
    try {
      const name = file.name.toLowerCase();
      let text = "";
      if (name.endsWith(".pdf")) text = await extractPDF(file);
      else if (name.endsWith(".docx")) text = await extractDOCX(file);
      else if (name.endsWith(".txt")) text = await extractTXT(file);
      else { setError("Please upload a PDF, DOCX, or TXT file."); setExtracting(false); return; }
      if (!text || text.length < 50) { setError("Could not read text from this file. Try a different format."); setExtracting(false); return; }
      setCvText(text);
      setCvFileName(file.name);
    } catch(e) {
      setError("Error reading file: " + e.message);
    }
    setExtracting(false);
  };

  const onDrop = useCallback(e => {
    e.preventDefault(); setDragging(false);
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  }, []);

  const onDragOver = e => { e.preventDefault(); setDragging(true); };
  const onDragLeave = () => setDragging(false);
  const onFileChange = e => { if(e.target.files[0]) processFile(e.target.files[0]); };

  const inp = { width:"100%", padding:"12px 16px", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:"10px", color:"#e8e8f0", fontSize:"13px", outline:"none", resize:"vertical", fontFamily:"inherit", lineHeight:"1.6" };

  return (
    <div>
      {!cvText ? (
        <div>
          <div className={`drop-zone${dragging?" drag-over":""}`}
            onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
            onClick={() => fileRef.current.click()}>
            <input ref={fileRef} type="file" accept=".pdf,.docx,.txt" onChange={onFileChange} />
            {extracting ? (
              <div>
                <div style={{ display:"inline-block", width:"28px", height:"28px", border:"3px solid rgba(232,197,71,0.2)", borderTopColor:"#e8c547", borderRadius:"50%", animation:"spin 0.8s linear infinite", marginBottom:"12px" }} />
                <div style={{ color:"#e8c547", fontWeight:"600" }}>Reading your CV...</div>
              </div>
            ) : (
              <div>
                <div style={{ fontSize:"36px", marginBottom:"12px" }}>📄</div>
                <div style={{ color:"#e8e8f0", fontWeight:"700", fontSize:"15px", marginBottom:"6px" }}>Drop your CV here or click to upload</div>
                <div style={{ color:"#8888a8", fontSize:"13px" }}>Supports PDF, DOCX, TXT</div>
              </div>
            )}
          </div>
          {error && <div style={{ color:"#ff6b6b", fontSize:"13px", marginTop:"10px", padding:"10px 14px", background:"rgba(255,107,107,0.08)", borderRadius:"8px" }}>⚠ {error}</div>}
          <div style={{ marginTop:"16px" }}>
            <div style={{ color:"#8888a8", fontSize:"12px", marginBottom:"8px", fontWeight:"600", textTransform:"uppercase", letterSpacing:"0.5px" }}>Or paste your CV text directly</div>
            <textarea style={{ ...inp, minHeight:"160px" }} placeholder="Paste your full CV content here..." onChange={e => { if(e.target.value.length > 50){ setCvText(e.target.value); setCvFileName("Pasted CV"); }}} />
          </div>
        </div>
      ) : (
        <div style={{ background:"rgba(76,175,80,0.08)", border:"1px solid rgba(76,175,80,0.25)", borderRadius:"12px", padding:"18px 20px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px" }}>
            <div>
              <span style={{ color:"#81c784", fontWeight:"700", fontSize:"15px" }}>✓ CV Loaded</span>

            {cvText.slice(0, 300)}...

}

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"16px",marginBottom:"28px"}}>
          {[["Total Jobs",total,"#e8c547"],["Applied",applied,"#64b5f6"],["Open",open,"#81c784"],["Apply Rate",rate+"%","#f4a261"]].map(([label,val,color])=>(
            <div key={label} style={{background:`linear-gradient(135deg,${color}14,${color}06)`,border:`1px solid ${color}28`,borderRadius:"12px",padding:"20px 24px",textAlign:"center"}}>
              <div style={{fontSize:"36px",fontWeight:"800",color,lineHeight:1,marginBottom:"6px"}}>{val}</div>
              <div style={{fontSize:"11px",color:"#8888a8",fontWeight:"600",letterSpacing:"0.8px",textTransform:"uppercase"}}>{label}</div>
            </div>
          ))}
        </div>

        {/* ── APPLY TAB ── */}
        {tab==="apply" && (
          <div style={{animation:"fadeIn 0.3s ease"}}>

            {/* Step 1: Upload CV */}
            <div style={card}>
              <div style={sTitle}>
                <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:"28px",height:"28px",background:"linear-gradient(135deg,#e8c547,#f4a261)",borderRadius:"50%",color:"#1a1a2e",fontWeight:"800",fontSize:"13px",flexShrink:0}}>1</span>
                Upload Your CV
              </div>
              <CVUploadZone cvText={cvText} setCvText={setCvText} cvFileName={cvFileName} setCvFileName={setCvFileName} />
            </div>

            {/* Step 2: Job Details + JD */}
            <div style={card}>
              <div style={sTitle}>
                <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:"28px",height:"28px",background:"linear-gradient(135deg,#e8c547,#f4a261)",borderRadius:"50%",color:"#1a1a2e",fontWeight:"800",fontSize:"13px",flexShrink:0}}>2</span>
                Enter Job Details & Paste JD
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
                <div><label style={lbl}>Company Name</label><input style={inp} placeholder="e.g. Sanofi India" value={company} onChange={e=>setCompany(e.target.value)} /></div>
                <div><label style={lbl}>Role / Job Title</label><input style={inp} placeholder="e.g. Senior Manager – Supply Chain" value={role} onChange={e=>setRole(e.target.value)} /></div>
                <div><label style={lbl}>Job Link / URL</label><input style={inp} placeholder="https://jobs.sanofi.com/..." value={link} onChange={e=>setLink(e.target.value)} /></div>
                <div><label style={lbl}>Source</label><input style={inp} placeholder="LinkedIn / Naukri / Direct" value={source} onChange={e=>setSource(e.target.value)} /></div>
              </div>
              <label style={lbl}>Paste Full Job Description *</label>
              <textarea style={{...inp,minHeight:"200px",resize:"vertical",lineHeight:"1.6",fontFamily:"inherit"}}
                placeholder="Paste the complete JD here — responsibilities, requirements, preferred skills, all keywords. The more complete, the better the ATS optimisation."
                value={jd} onChange={e=>setJd(e.target.value)} />
              <div style={{marginTop:"16px",marginBottom:"20px"}}>
                <label style={lbl}>Notes (optional)</label>
                <input style={inp} placeholder="e.g. Referral from alumni, high priority" value={notes} onChange={e=>setNotes(e.target.value)} />
              </div>
              <div style={{display:"flex",gap:"12px",alignItems:"center",flexWrap:"wrap"}}>
                <button className="btn-primary" style={{...btnP,opacity:loading?0.7:1}} onClick={tailorCV} disabled={loading}>
                  {loading ? (
                    <span style={{display:"flex",alignItems:"center",gap:"10px"}}>
                      <span style={{display:"inline-block",width:"16px",height:"16px",border:"2px solid rgba(26,26,46,0.3)",borderTopColor:"#1a1a2e",borderRadius:"50%",animation:"spin 0.8s linear infinite"}} />
                      AI is tailoring your CV...
                    </span>
                  ) : "✨ Generate ATS-Optimised CV"}
                </button>
                {flash && <span style={{color: flash.startsWith("⚠") ? "#ff9800" : "#81c784",fontSize:"13px",fontWeight:"600",animation:"fadeIn 0.3s ease"}}>{flash}</span>}
              </div>
              {!cvText && <div style={{marginTop:"12px",fontSize:"13px",color:"#ff9800"}}>⚠ Upload your CV in Step 1 before generating.</div>}
            </div>

            {/* Output */}
            {tailoredCV && (
              <div style={{...card,border:"1px solid rgba(232,197,71,0.2)",animation:"fadeIn 0.4s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"12px"}}>
                  <div style={sTitle}>📄 Tailored CV — {company || "Your Application"}</div>
                  <button className="btn-secondary" style={btnS} onClick={copyCV}>{copied?"✓ Copied!":"📋 Copy to Clipboard"}</button>
                </div>

                {/* ATS Keywords */}
                {atsKeywords.length > 0 && (
                  <div style={{marginBottom:"16px",padding:"14px 16px",background:"rgba(33,150,243,0.08)",border:"1px solid rgba(33,150,243,0.2)",borderRadius:"10px"}}>
                    <div style={{fontSize:"12px",color:"#64b5f6",fontWeight:"700",marginBottom:"10px",textTransform:"uppercase",letterSpacing:"0.5px"}}>🎯 ATS Keywords Injected</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                      {atsKeywords.map(kw=>(
                        <span key={kw} style={{padding:"4px 12px",background:"rgba(33,150,243,0.12)",border:"1px solid rgba(33,150,243,0.25)",borderRadius:"20px",color:"#90caf9",fontSize:"12px",fontWeight:"600"}}>{kw}</span>
                      ))}
                    </div>
                  </div>
                )}

                <div style={{background:"rgba(0,0,0,0.3)",border:"1px solid rgba(232,197,71,0.15)",borderRadius:"12px",padding:"24px",fontFamily:"'Courier New',monospace",fontSize:"12.5px",lineHeight:"1.75",color:"#d4d4e8",whiteSpace:"pre-wrap",maxHeight:"480px",overflowY:"auto"}}>
                  {tailoredCV}
                </div>
                <div style={{marginTop:"16px",padding:"12px 16px",background:"rgba(232,197,71,0.07)",borderRadius:"8px",fontSize:"13px",color:"#c8b847",lineHeight:"1.5"}}>
                  💡 <strong>Next steps:</strong> Copy CV above → Apply on company portal → Come back to <strong>Application Tracker</strong> tab → Click <strong>"✓ Mark Applied"</strong>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── TRACKER TAB ── */}
        {tab==="tracker" && (
          <div style={{animation:"fadeIn 0.3s ease"}}>
            <div style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px",flexWrap:"wrap",gap:"12px"}}>
                <div style={sTitle}>📋 Application Tracker</div>
                <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
                  {["All","Open","Applied"].map(s=>(
                    <button key={s} className="btn-secondary" style={{...btnS,...(filterStatus===s?{background:"rgba(232,197,71,0.14)",color:"#e8c547",borderColor:"rgba(232,197,71,0.3)"}:{})}}
                      onClick={()=>setFilterStatus(s)}>{s}</button>
                  ))}
                  <button className="btn-primary" style={{...btnP,padding:"9px 20px",fontSize:"13px"}} onClick={()=>setShowAddForm(!showAddForm)}>+ Add Job</button>
                </div>
              </div>

              {showAddForm && <AddJobForm onAdd={addJob} onCancel={()=>setShowAddForm(false)} />}

              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 3px",fontSize:"13px"}}>
                  <thead>
                    <tr>
                      {["Company","Role / Position","Source","Date Added","Date Applied","Status","Actions"].map(h=>(
                        <th key={h} style={{padding:"12px 14px",textAlign:"left",color:"#8888a8",fontWeight:"600",fontSize:"11px",letterSpacing:"0.7px",textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,0.07)",whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filteredJobs.length===0 ? (
                      <tr><td colSpan={7} style={{padding:"32px",textAlign:"center",color:"#666"}}>No jobs found. Click "+ Add Job" or use the Apply tab.</td></tr>
                    ) : filteredJobs.map(j=>(
                      <tr key={j.id}>
                        <td style={{padding:"13px 14px",fontWeight:"700",color:"#e8e8f0",background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.04)",whiteSpace:"nowrap"}}>{j.company}</td>
                        <td style={{padding:"13px 14px",color:"#c8c8d8",background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.04)",maxWidth:"240px"}}>{j.role}</td>
                        <td style={{padding:"13px 14px",color:"#8888a8",fontSize:"12px",background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.04)",whiteSpace:"nowrap"}}>{j.source}</td>
                        <td style={{padding:"13px 14px",fontSize:"12px",color:"#b8b8c8",background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.04)",whiteSpace:"nowrap"}}>{j.dateAdded}</td>
                        <td style={{padding:"13px 14px",fontSize:"12px",color:"#b8b8c8",background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.04)",whiteSpace:"nowrap"}}>{j.dateApplied||"—"}</td>
                        <td style={{padding:"13px 14px",background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                          {j.status==="Open"
                            ?<span style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"4px 12px",background:"rgba(76,175,80,0.13)",border:"1px solid rgba(76,175,80,0.28)",borderRadius:"20px",color:"#81c784",fontSize:"11px",fontWeight:"700"}}>● Open</span>
                            :<span style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"4px 12px",background:"rgba(33,150,243,0.13)",border:"1px solid rgba(33,150,243,0.28)",borderRadius:"20px",color:"#64b5f6",fontSize:"11px",fontWeight:"700"}}>✓ Applied</span>
                          }
                        </td>
                        <td style={{padding:"13px 14px",background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                          <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                            {j.status==="Open"&&(
                              <button className="btn-green" onClick={()=>markApplied(j.id)}
                                style={{padding:"7px 14px",background:"linear-gradient(135deg,#4caf50,#2e7d32)",border:"none",borderRadius:"7px",color:"#fff",fontWeight:"700",fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",transition:"opacity 0.2s"}}>
                                ✓ Applied
                              </button>
                            )}
                            {j.link&&(
                              <a href={j.link} target="_blank" rel="noopener noreferrer"
                                style={{padding:"7px 12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"7px",color:"#8888a8",textDecoration:"none",fontSize:"13px",display:"inline-block"}} title="Open job link">🔗</a>
                            )}
                            <button onClick={()=>removeJob(j.id)}
                              style={{padding:"7px 12px",background:"rgba(255,107,107,0.08)",border:"1px solid rgba(255,107,107,0.18)",borderRadius:"7px",color:"#ff6b6b",cursor:"pointer",fontSize:"13px",fontWeight:"600"}}>✕</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:"20px",display:"flex",justifyContent:"flex-end"}}>
                <button className="btn-primary" style={btnP} onClick={exportExcel}>⬇ Download Excel Tracker</button>
              </div>
            </div>
          </div>
        )}

        {/* ── COMPANIES TAB ── */}
        {tab==="companies" && (
          <div style={{animation:"fadeIn 0.3s ease"}}>
            <div style={card}>
              <div style={sTitle}>🏢 Target Companies & Job Portals</div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"20px"}}>
                {CATEGORIES.map(c=>(
                  <button key={c} className="btn-secondary" style={{...btnS,fontSize:"12px",padding:"6px 14px",...(filterCat===c?{background:"rgba(232,197,71,0.13)",color:"#e8c547",borderColor:"rgba(232,197,71,0.28)"}:{})}}
                    onClick={()=>setFilterCat(c)}>{c}</button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:"12px"}}>
                {TARGET_COMPANIES.filter(c=>filterCat==="All"||c.category===filterCat).map(c=>{
                  const col=CAT_COLORS[c.category]||"#666";
                  return(
                    <a key={c.name} href={c.url} target="_blank" rel="noopener noreferrer" className="company-card"
                      style={{background:`linear-gradient(135deg,${col}10,${col}05)`,border:`1px solid ${col}25`,borderRadius:"10px",padding:"15px 16px",textDecoration:"none",transition:"all 0.2s",display:"block"}}>
                      <div style={{fontWeight:"700",fontSize:"14px",color:"#e8e8f0",marginBottom:"4px"}}>{c.name}</div>
                      <div style={{fontSize:"11px",color:"#8888a8"}}>{c.category}</div>
                      <div style={{fontSize:"11px",color:col,marginTop:"10px",fontWeight:"600"}}>Open careers →</div>
                    </a>
                  );
                })}
              </div>
            </div>
            <div style={{...card,background:"rgba(232,197,71,0.04)",border:"1px solid rgba(232,197,71,0.13)"}}>
              <div style={sTitle}>📌 Hyderabad Job Search Strategy</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"20px",fontSize:"13px",color:"#c8c8d8",lineHeight:"1.7"}}>
                <div>
                  <div style={{fontWeight:"700",color:"#e8c547",marginBottom:"10px",fontSize:"14px"}}>Best Job Portals</div>
                  <div>→ LinkedIn (Senior Manager + Hyderabad)</div>
                  <div>→ Naukri.com (9–12 yrs experience filter)</div>
                  <div>→ IIM Jobs (MBA-tier premium roles)</div>
                  <div>→ Indeed India (set daily job alerts)</div>
                  <div>→ Company career pages directly</div>
                </div>
                <div>
                  <div style={{fontWeight:"700",color:"#e8c547",marginBottom:"10px",fontSize:"14px"}}>Best-Fit Keywords</div>
                  <div>→ Senior Manager – Strategy & Operations</div>
                  <div>→ Head of Supply Chain</div>
                  <div>→ Business Development Head</div>
                  <div>→ GCC Operations Lead</div>
                  <div>→ GTM Strategy Manager</div>
                </div>
                <div>
                  <div style={{fontWeight:"700",color:"#e8c547",marginBottom:"10px",fontSize:"14px"}}>Pro Tips</div>
                  <div>→ Apply Mon–Wed for best HR visibility</div>
                  <div>→ Connect with HR on LinkedIn after applying</div>
                  <div>→ Use UCD Smurfit + Yale alumni networks</div>
                  <div>→ GCC boom in Hyd: Wells Fargo, HSBC, Citi</div>
                  <div>→ Set Naukri profile to "Actively Looking"</div>
                </div>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
